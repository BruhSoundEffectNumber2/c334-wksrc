# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Python CI

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    ci:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-python@v6
              with:
                  python-version: "3.10"
                  cache: "pip"
            - name: Install dependencies
              run: pip install -r requirements.txt
            - name: Run unit tests and coverage
              run: pytest --cov=wksrc
            - name: Run linting
              run: pylint wksrc/*.py --exit-zero
    cd:
        needs: ci
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-python@v6
              with:
                  python-version: "3.10"
                  cache: "pip"
            - name: Zip and move to dist
              run: mkdir dist/wksrc/usr/local/bin && python3 -m zipapp wksrc -p "/usr/bin/env python3" --output dist/wksrc/usr/local/bin/wksrc -m user:main
            - name: Setup for packaging
              run: chmod +x dist/wksrc/usr/local/bin/wksrc
            - name: Package
              run: dpkg-deb -b dist/wksrc
            - name: Upload package
              uses: actions/upload-artifact@v4
              with:
                  name: wksrc
                  path: dist/wksrc.deb
